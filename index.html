<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>f.Sentence | Flake Software</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF8F00; /* Your orange */
            --background: #000000; /* Pitch Black */
            --surface: #1C1B1F; /* M3 Dark Surface */
            --on-surface: #E6E1E5;
        }

        body {
            background-color: var(--background);
            color: var(--on-surface);
            font-family: 'Google Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero {
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .card {
            background: var(--surface);
            border-radius: 28px;
            padding: 24px;
            margin: 20px;
            max-width: 600px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .button {
            background: var(--primary);
            color: black;
            padding: 12px 24px;
            border-radius: 100px; /* Pill shape */
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>f.Sentence</h1>
        <p>The open-source text processor for the next generation.</p>
        <a href="https://github.com/Flake-Software/f.Sentence" class="button">View on GitHub</a>
    </section>

    <div class="card">
        <h3>Material You, by choice.</h3>
        <p>Enjoy a beautiful interface that stays out of your way.</p>
    </div>
</body>
</html>
